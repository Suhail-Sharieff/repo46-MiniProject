<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steganography Tools Web - Advanced</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f4f4; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .section { margin-bottom: 30px; border-top: 1px solid #ccc; padding-top: 20px; }
        .btn { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .btn:hover { background-color: #0056b3; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .result { padding: 10px; background-color: #e9ecef; border-radius: 4px; margin-top: 10px; display: none; }
        .metrics { margin-top: 10px; padding: 10px; background-color: #d1ecf1; color: #0c5460; border-radius: 4px; }
        .info { font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Advanced Steganography Web App</h1>
        <p>Hide secret messages securely using Hybrid AES Encryption & PRNG Scattering.</p>
        
        <div class="section" id="encode-section">
            <h2>Encode Message</h2>
            <form id="encodeForm" enctype="multipart/form-data">
                <label for="enc-type">Type of Cover File:</label>
                <select id="enc-type" name="type" required>
                    <option value="image">Image (.jpg, .png)</option>
                    <option value="text">Text (.txt)</option>
                    <option value="audio">Audio (.wav)</option>
                </select>
                
                <label for="enc-file">Upload Cover File:</label>
                <input type="file" id="enc-file" name="file" required>
                
                <label for="enc-text">Secret Message:</label>
                <textarea id="enc-text" name="text" rows="3" placeholder="Enter the secret message here..." required></textarea>
                
                <label for="enc-pass">Encryption Password (Optional, Image Only):</label>
                <input type="password" id="enc-pass" name="password" placeholder="Enter a secure password for Advanced Mode">
                <div class="info">If provided, enables AES-256 encryption, PRNG bit scattering, and generates Steganalysis metrics.</div>

                <button type="submit" class="btn" style="margin-top:15px;">Encode & Generate</button>
            </form>
            <div id="enc-status" class="result"></div>
        </div>

        <div class="section" id="decode-section">
            <h2>Decode Message</h2>
            <form id="decodeForm" enctype="multipart/form-data">
                <label for="dec-type">Type of Stego File:</label>
                <select id="dec-type" name="type" required>
                    <option value="image">Image (.png)</option>
                    <option value="text">Text (.txt)</option>
                    <option value="audio">Audio (.wav)</option>
                </select>
                
                <label for="dec-file">Upload Stego File:</label>
                <input type="file" id="dec-file" name="file" required>
                
                <label for="dec-pass">Decryption Password (If used during encoding):</label>
                <input type="password" id="dec-pass" name="password" placeholder="Enter the exact password used to encode">
                
                <button type="submit" class="btn" style="margin-top:15px;">Extract Secret Message</button>
            </form>
            <div id="dec-result" class="result"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:6868';

        document.getElementById('encodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const statusDiv = document.getElementById('enc-status');
            statusDiv.style.display = 'block';
            statusDiv.innerText = 'Encoding...';
            
            try {
                const response = await fetch(`${API_URL}/encode`, {
                    method: 'POST',
                    body: formData
                });
                
                const contentType = response.headers.get('content-type');
                
                if (response.ok) {
                    if (contentType && contentType.includes('application/json')) {
                        // Advanced JSON Response
                        const data = await response.json();
                        if (data.file_url) {
                            statusDiv.innerHTML = `
                                <strong>Success!</strong><br><br>
                                <a href="${API_URL}${data.file_url}" target="_blank" download class="btn" style="display:inline-block; text-decoration:none;">Download Stego File</a>
                                <br><br>
                                <div class="metrics">
                                    <strong>Steganalysis Metrics (vs Original):</strong><br>
                                    PSNR (Peak Signal-to-Noise Ratio): ${data.metrics.psnr} dB <br>
                                    SSIM (Structural Similarity Index): ${data.metrics.ssim}
                                </div>
                            `;
                        } else if (data.error) {
                            statusDiv.innerText = 'Error: ' + data.error;
                        }
                    } else {
                        // Basic Blob Response
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = 'stego_file';
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        statusDiv.innerText = 'File encoded and downloaded successfully (Basic LSB Mode).';
                    }
                } else {
                    const errorData = await response.json();
                    statusDiv.innerText = 'Error: ' + errorData.error;
                }
            } catch (err) {
                statusDiv.innerText = 'Error: ' + err.message;
            }
        });

        document.getElementById('decodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const resultDiv = document.getElementById('dec-result');
            resultDiv.style.display = 'block';
            resultDiv.innerText = 'Extracting...';
            
            try {
                const response = await fetch(`${API_URL}/decode`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if(data.hidden_text.startsWith("Decryption failed")){
                        resultDiv.innerHTML = `<strong style="color:red;">Error:</strong> <br>${data.hidden_text}`;
                    } else {
                        resultDiv.innerHTML = `<strong>Hidden Message:</strong> <br>${data.hidden_text}`;
                    }
                } else {
                    const errorData = await response.json();
                    resultDiv.innerText = 'Error: ' + errorData.error;
                }
            } catch (err) {
                resultDiv.innerText = 'Error: ' + err.message;
            }
        });
    </script>
</body>
</html>
